<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Anime Quotes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Zen+Old+Mincho:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <div class="scene-bg" aria-hidden="true"></div>
  <div class="halftone-bg" aria-hidden="true"></div>

  <main class="stage">

    <section class="panel" id="panel">

      <div class="panel-top">
        <span class="tag" id="counter">PANEL 001</span>
        <span class="tag tag--accent" id="status">● LIVE</span>
      </div>

      <h1 class="show" id="name">loading name...</h1>

      <div class="bubble">
        <p class="quote" id="quote">loading quote....</p>
      </div>

      <div class="panel-bottom">

        <button
          class="btn-icon"
          id="narrate"
          aria-label="Narrate this quote"
          title="Narrate this quote">

          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M8 5v14l11-7z"/>
          </svg>

        </button>

        <h4 id="char">— char</h4>

      </div>

    </section>

    <button class="btn-next" id="next">
      NEXT PANEL →
    </button>

  </main>

  <script src="script.js"></script>

</body>
</html>
